<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <!-- Enlace al CSS -->
  <link rel="stylesheet" href="./cart.css">
  <title>Mi Carrito</title>
</head>
<body>
  <nav class="navbar">
    <span class="logo">FoodStore</span>
    <div class="nav-links">
      <a href="../home/home.html">Catálogo</a>
      <a href="./cart.html">Carrito <span id="cart-count">0</span></a>
    </div>
  </nav>
  
  <h1>Mi Carrito</h1>

  <div class="cart-layout">
    <!-- Productos -->
    <div id="cart-items" class="cart-container"></div>

    <!-- Resumen -->
    <aside class="cart-summary">
      <h2>Resumen</h2>
      <p id="cart-subtotal">Subtotal: $0</p>
      <p id="cart-total">Total: $0</p>
      <button>Finalizar compra</button>
      <p class="warning">El checkout no está disponible en esta versión</p>
      <button onclick="emptyCart()">Vaciar carrito</button>
      <a href="../home/home.html">← Volver al catálogo</a>
    </aside>
  </div>

  <script type="module" src="./cart.js"></script>
</body>

</html>
