<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Store - Catálogo</title>
  <link rel="stylesheet" href="./home.css">
</head>
<body>
  <nav class="navbar">
    <span class="logo">🍔 Food Store</span>
    <div class="nav-links">
      <a href="./home.html">Inicio</a>
      <a href="/src/pages/client/orders/orders.html">Mis Pedidos</a>
      <a href="/src/pages/store/cart/cart.html">🛒 Carrito <span id="cart-count">0</span></a>
      <button id="logoutButton">Cerrar Sesión</button>
    </div>
  </nav>

  <div class="catalog-layout">
    <aside class="sidebar">
      <h2>Categorías</h2>
      <ul id="category-list"></ul>
    </aside>

    <main class="main-content">
      <h1>Todos los Productos</h1>
      <div class="filters">
        <input type="text" id="search" placeholder="Buscar producto...">
        <select id="order">
          <option value="">Ordenar por</option>
          <option value="az">Nombre A-Z</option>
          <option value="za">Nombre Z-A</option>
          <option value="asc">Precio ascendente</option>
          <option value="desc">Precio descendente</option>
        </select>
      </div>
      <div id="product-list"></div>
    </main>
  </div>

  <script type="module" src="./home.ts"></script>
</body>
</html>
