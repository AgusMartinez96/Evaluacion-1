<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Store - Admin</title>
  <link rel="stylesheet" href="./home.css">
</head>
<body>
  <div class="layout">
    
    <!-- Sidebar -->
    <aside id="sidebar">
      <h2>🍔 Food Store</h2>
      <nav>
        <ul>
          <li><a href="./home.html">Dashboard</a></li>
          <li><a href="/src/pages/admin/categories/categories.html">Categorías</a></li>
          <li><a href="/src/pages/admin/products/products.html">Productos</a></li>
          <li><a href="/src/pages/admin/orders/orders.html">Pedidos</a></li>
          <li><a href="/src/pages/store/home/home.html">Ver Tienda</a></li>
        </ul>
      </nav>
      <button id="logoutButton">Cerrar Sesión</button>
    </aside>

    <!-- Contenido principal -->
    <main>
      <h1>Panel de Administración</h1>

      <!-- 4 tarjetas de estadísticas -->
      <div class="stats-container">
        <div class="stat-card">
          <h3>Categorías</h3>
          <p id="total-categorias">-</p>
        </div>
        <div class="stat-card">
          <h3>Productos</h3>
          <p id="total-productos">-</p>
        </div>
        <div class="stat-card">
          <h3>Pedidos</h3>
          <p id="total-pedidos">-</p>
        </div>
        <div class="stat-card">
          <h3>Disponibles</h3>
          <p id="total-disponibles">-</p>
        </div>
      </div>

      <!-- Panel de resumen -->
      <div class="summary-panel">
        <h2>Resumen Rápido</h2>
        <div id="resumen"></div>
      </div>
    </main>
  </div>

  <script type="module" src="./home.ts"></script>
</body>
</html>
