<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Store - Productos</title>
</head>
<body>
  <div style="display:flex">
    <aside style="width:200px; min-height:100vh; background:#333; color:white; padding:20px">
      <h2>🍔 Food Store</h2>
      <nav>
        <ul style="list-style:none; padding:0">
          <li><a href="/src/pages/admin/adminHome/home.html" style="color:white">Dashboard</a></li>
          <li><a href="/src/pages/admin/categories/categories.html" style="color:white">Categorías</a></li>
          <li><a href="./products.html" style="color:white">Productos</a></li>
          <li><a href="/src/pages/admin/orders/orders.html" style="color:white">Pedidos</a></li>
          <li><a href="/src/pages/store/home/home.html" style="color:white">Ver Tienda</a></li>
        </ul>
      </nav>
      <button id="logoutButton">Cerrar Sesión</button>
    </aside>

    <main style="flex:1; padding:20px">
      <div style="display:flex; justify-content:space-between; align-items:center">
        <h1>Gestión de Productos</h1>
        <button id="btn-nuevo">+ Nuevo Producto</button>
      </div>

      <table border="1" style="width:100%; border-collapse:collapse">
        <thead>
          <tr>
            <th>ID</th>
            <th>Imagen</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Precio</th>
            <th>Categoría</th>
            <th>Stock</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tbody-productos"></tbody>
      </table>

      <!-- Modal -->
      <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000">
        <div style="background:white; padding:24px; border-radius:8px; width:400px; max-height:90vh; overflow-y:auto">
          <h2 id="modal-titulo">Nuevo Producto</h2>
          <label>Nombre</label>
          <input type="text" id="input-nombre" style="width:100%; margin:8px 0"><br>
          <label>Descripción</label>
          <textarea id="input-descripcion" style="width:100%; margin:8px 0"></textarea><br>
          <label>Precio</label>
          <input type="number" id="input-precio" style="width:100%; margin:8px 0"><br>
          <label>Stock</label>
          <input type="number" id="input-stock" style="width:100%; margin:8px 0"><br>
          <label>Categoría</label>
          <select id="input-categoria" style="width:100%; margin:8px 0"></select><br>
          <label>URL de Imagen</label>
          <input type="text" id="input-imagen" style="width:100%; margin:8px 0"><br>
          <label>
            <input type="checkbox" id="input-disponible"> Producto disponible
          </label><br><br>
          <button id="btn-guardar">Guardar</button>
          <button id="btn-cerrar-modal">Cancelar</button>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="./products.ts"></script>
</body>
</html>
