<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Store - Productos</title>
  <link rel="stylesheet" href="./products.css">
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside id="sidebar">
      <h2>🍔 Food Store</h2>
      <nav>
        <ul>
          <li><a href="/src/pages/admin/adminHome/home.html">Dashboard</a></li>
          <li><a href="/src/pages/admin/categories/categories.html">Categorías</a></li>
          <li><a href="./products.html">Productos</a></li>
          <li><a href="/src/pages/admin/orders/orders.html">Pedidos</a></li>
          <li><a href="/src/pages/store/home/home.html">Ver Tienda</a></li>
        </ul>
      </nav>
      <button id="logoutButton">Cerrar Sesión</button>
    </aside>

    <!-- Contenido principal -->
    <main>
      <div class="header-bar">
        <h1>Gestión de Productos</h1>
        <button id="btn-nuevo" class="btn-primary">+ Nuevo Producto</button>
      </div>

      <table id="tabla-productos">
        <thead>
          <tr>
            <th>ID</th>
            <th>Imagen</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Precio</th>
            <th>Categoría</th>
            <th>Stock</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tbody-productos"></tbody>
      </table>

      <!-- Modal -->
      <div id="modal" class="modal">
        <div class="modal-content">
          <h2 id="modal-titulo">Nuevo Producto</h2>
          <label>Nombre</label>
          <input type="text" id="input-nombre"><br>
          <label>Descripción</label>
          <textarea id="input-descripcion"></textarea><br>
          <label>Precio</label>
          <input type="number" id="input-precio"><br>
          <label>Stock</label>
          <input type="number" id="input-stock"><br>
          <label>Categoría</label>
          <select id="input-categoria"></select><br>
          <label>URL de Imagen</label>
          <input type="text" id="input-imagen"><br>
          <label>
            <input type="checkbox" id="input-disponible"> Producto disponible
          </label><br><br>
          <button id="btn-guardar" class="btn-primary">Guardar</button>
          <button id="btn-cerrar-modal" class="btn-secondary">Cancelar</button>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="./products.ts"></script>
</body>
</html>
