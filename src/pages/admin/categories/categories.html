<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Store - Categorías</title>
  <link rel="stylesheet" href="./categories.css">
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside id="sidebar">
      <h2>🍔 Food Store</h2>
      <nav>
        <ul>
          <li><a href="/src/pages/admin/adminHome/home.html">Dashboard</a></li>
          <li><a href="./categories.html">Categorías</a></li>
          <li><a href="/src/pages/admin/products/products.html">Productos</a></li>
          <li><a href="/src/pages/admin/orders/orders.html">Pedidos</a></li>
          <li><a href="/src/pages/store/home/home.html">Ver Tienda</a></li>
        </ul>
      </nav>
      <button id="logoutButton">Cerrar Sesión</button>
    </aside>

    <!-- Contenido principal -->
    <main>
      <div class="header-bar">
        <h1>Gestión de Categorías</h1>
        <button id="btn-nueva" class="btn-primary">+ Nueva Categoría</button>
      </div>

      <table id="tabla-categorias">
        <thead>
          <tr>
            <th>ID</th>
            <th>Imagen</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tbody-categorias"></tbody>
      </table>

      <!-- Modal crear/editar -->
      <div id="modal" class="modal">
        <div class="modal-content">
          <h2 id="modal-titulo">Nueva Categoría</h2>
          <div>
            <label>Nombre</label>
            <input type="text" id="input-nombre">
          </div>
          <div>
            <label>Descripción</label>
            <textarea id="input-descripcion"></textarea>
          </div>
          <div>
            <label>URL de Imagen</label>
            <input type="text" id="input-imagen" placeholder="https://ejemplo.com/imagen.jpg">
          </div>
          <button id="btn-guardar" class="btn-primary">Guardar</button>
          <button id="btn-cerrar-modal" class="btn-secondary">Cancelar</button>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="./categories.ts"></script>
</body>
</html>
