<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Store - Registro</title>
</head>
<body>
  <h1>Registro</h1>

  <form id="form-register">
    <div>
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" placeholder="Tu nombre" autocomplete="off">
    </div>
    <div>
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="example@example.com" autocomplete="off">
    </div>
    <div>
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="Mínimo 6 caracteres" autocomplete="off">
    </div>
    <button type="submit">Registrarse</button>
    <p>¿Ya tenés cuenta? <a href="/src/pages/auth/login/login.html">Iniciá sesión</a></p>
  </form>

  <script type="module" src="./register.ts"></script>
</body>
</html>
