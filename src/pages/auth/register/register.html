<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Store - Registro</title>
  <link rel="stylesheet" href="./register.css">
</head>
<body>
  <div class="container">
    <form id="form-register" class="register-form">
      <h1>Food Store</h1>
      <h2>Crear Cuenta</h2>

      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" placeholder="Tu nombre" autocomplete="off">

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="example@example.com" autocomplete="off">

      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="Mínimo 6 caracteres" autocomplete="off">

      <button type="submit">Registrarse</button>

      <div class="login-link">
        ¿Ya tenés cuenta? <a href="/src/pages/auth/login/login.html">Iniciá sesión</a>
      </div>
    </form>
  </div>

  <script type="module" src="./register.ts"></script>
</body>
</html>
