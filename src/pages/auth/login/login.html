<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Store - Login</title>
</head>
<body>
  <h1>Login</h1>

  <form id="form">
    <div>
      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="off" placeholder="example@example.com">
    </div>
    <div>
      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" autocomplete="off" placeholder="********">
    </div>
    <button type="submit">Ingresar</button>
    <p>¿No tenés cuenta? <a href="/src/pages/auth/register/register.html">Registrate</a></p>
  </form>

  <script type="module" src="./login.ts"></script>
</body>
</html>
